<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- HoverPeek Icon - "浮動預覽" -->
  <defs>
    <!-- 背景：深海藍到墨綠 -->
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- 預覽視窗背景 -->
    <linearGradient id="previewBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.92"/>
    </linearGradient>

    <!-- 主文件色 -->
    <linearGradient id="fileFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#64748b" stop-opacity="0.4"/>
    </linearGradient>

    <!-- 強調色漸層（翠綠到青色） -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- 預覽圖片漸層 -->
    <linearGradient id="imgPreview" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="30%" stop-color="#818cf8"/>
      <stop offset="60%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>

    <!-- 視窗陰影 -->
    <filter id="windowShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 外光暈 -->
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComponentTransfer in="blur"><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 游標陰影 -->
    <filter id="cShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="1" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 微光 -->
    <radialGradient id="ambientLight" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>

    <!-- 連接線漸層 -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- ===== 背景 ===== -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg2)"/>
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#ambientLight)"/>

  <!-- ===== 底層檔案圖示（大，半透明） ===== -->
  <g transform="translate(40, 60)">
    <!-- 檔案外框 -->
    <path d="M 0 10 Q 0 0 10 0 L 65 0 L 90 25 L 90 130 Q 90 140 80 140 L 10 140 Q 0 140 0 130 Z"
          fill="url(#fileFill)" stroke="#475569" stroke-width="1" opacity="0.6"/>
    <!-- 摺角 -->
    <path d="M 65 0 L 65 18 Q 65 25 72 25 L 90 25 Z" fill="#475569" opacity="0.4"/>
    <!-- 內容線 -->
    <rect x="12" y="38" width="50" height="3" rx="1.5" fill="#64748b" opacity="0.3"/>
    <rect x="12" y="48" width="66" height="3" rx="1.5" fill="#64748b" opacity="0.25"/>
    <rect x="12" y="58" width="55" height="3" rx="1.5" fill="#64748b" opacity="0.25"/>
    <rect x="12" y="68" width="60" height="3" rx="1.5" fill="#64748b" opacity="0.2"/>
    <rect x="12" y="78" width="45" height="3" rx="1.5" fill="#64748b" opacity="0.2"/>
    <rect x="12" y="92" width="66" height="3" rx="1.5" fill="#64748b" opacity="0.15"/>
    <rect x="12" y="102" width="50" height="3" rx="1.5" fill="#64748b" opacity="0.15"/>
  </g>

  <!-- ===== 連接元素（檔案 → 預覽視窗） ===== -->
  <path d="M 110 120 Q 130 105 145 100" stroke="url(#lineGrad)" stroke-width="2"
        stroke-dasharray="4,3" fill="none" stroke-linecap="round"/>

  <!-- ===== 浮動預覽視窗（核心元素） ===== -->
  <g transform="translate(120, 55)" filter="url(#windowShadow)">
    <!-- 視窗主體 -->
    <rect x="0" y="0" width="108" height="88" rx="8" ry="8" fill="url(#previewBg)"/>

    <!-- 視窗標題列 -->
    <rect x="0" y="0" width="108" height="20" rx="8" ry="8" fill="#e2e8f0" opacity="0.8"/>
    <rect x="0" y="10" width="108" height="10" fill="#e2e8f0" opacity="0.8"/>

    <!-- 標題列三個圓點 -->
    <circle cx="12" cy="10" r="3" fill="#f87171" opacity="0.7"/>
    <circle cx="22" cy="10" r="3" fill="#fbbf24" opacity="0.7"/>
    <circle cx="32" cy="10" r="3" fill="#34d399" opacity="0.7"/>

    <!-- 預覽圖片（漸層色塊模擬） -->
    <rect x="8" y="26" width="92" height="54" rx="4" fill="url(#imgPreview)" opacity="0.85"/>

    <!-- 圖片中的山景象徵 -->
    <path d="M 8 72 L 30 50 L 48 64 L 68 42 L 100 72 Q 100 80 96 80 L 12 80 Q 8 80 8 76 Z"
          fill="#4338ca" opacity="0.4"/>
    <circle cx="28" cy="40" r="7" fill="#fde68a" opacity="0.6"/>

    <!-- 底部強調線 -->
    <rect x="0" y="85" width="108" height="3" rx="0 0 8 8" fill="url(#accent)" opacity="0.8"/>
  </g>

  <!-- ===== 滑鼠游標（指向預覽視窗） ===== -->
  <g transform="translate(112, 96)" filter="url(#cShadow)">
    <path d="M 0 0 L 0 30 L 8.5 23 L 13 34 L 18.5 31.5 L 14 21 L 22 21 Z"
          fill="#ffffff" stroke="#1e293b" stroke-width="1.8" stroke-linejoin="round"/>
  </g>

  <!-- ===== 光效強調 ===== -->
  <!-- 視窗邊框微光 -->
  <g transform="translate(120, 55)">
    <rect x="0" y="0" width="108" height="88" rx="8" ry="8"
          fill="none" stroke="#34d399" stroke-width="1" opacity="0.25"/>
  </g>

  <!-- 微光粒子 -->
  <circle cx="215" cy="48" r="1.2" fill="#34d399" opacity="0.5"/>
  <circle cx="235" cy="145" r="1" fill="#06b6d4" opacity="0.4"/>
  <circle cx="52" cy="44" r="1" fill="#94a3b8" opacity="0.3"/>
  <circle cx="195" cy="215" r="1.3" fill="#a78bfa" opacity="0.3"/>

  <!-- ===== 邊框 ===== -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48"
        fill="none" stroke="#334155" stroke-width="1" opacity="0.5"/>
</svg>
